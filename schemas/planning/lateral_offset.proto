syntax = "proto3";

package vmsgs.proto.planning;

import "common/header.proto";

// Lateral offset request applied on top of the reference path.
// Mirrors tier4_planning_msgs/LateralOffset.
message LateralOffset {
  vmsgs.proto.common.Header header = 1;
  // Offset in m, positive = left of the reference path.
  float lateral_offset = 2;
  // Offset that the planner has acknowledged and is currently tracking.
  float acknowledged_lateral_offset = 3;
}
