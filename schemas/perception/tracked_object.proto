syntax = "proto3";

package vmsgs.proto.perception;

import "common/header.proto";
import "common/uuid.proto";
import "geometry/pose.proto";
import "geometry/twist.proto";
import "geometry/accel.proto";
import "perception/shape.proto";
import "perception/object_classification.proto";

message TrackedObjectKinematics {
  enum OrientationAvailability {
    UNAVAILABLE = 0;
    SIGN_UNKNOWN = 1;
    AVAILABLE = 2;
  }

  vmsgs.proto.geometry.PoseWithCovariance pose_with_covariance = 1;
  OrientationAvailability orientation_availability = 2;
  vmsgs.proto.geometry.TwistWithCovariance twist_with_covariance = 3;
  vmsgs.proto.geometry.AccelWithCovariance acceleration = 4;
  bool is_stationary = 5;
}

message TrackedObject {
  vmsgs.proto.common.UUID object_id = 1;
  float existence_probability = 2;
  repeated ObjectClassification classification = 3;
  TrackedObjectKinematics kinematics = 4;
  Shape shape = 5;
}

message TrackedObjects {
  vmsgs.proto.common.Header header = 1;
  repeated TrackedObject objects = 2;
}
