syntax = "proto3";

package vmsgs.proto.localization;

import "common/header.proto";

// Per-scan registration metrics (NDT/ICP).
message LidarPoseAccuracy {
  vmsgs.proto.common.Header header = 1;
  // Final cost / fitness score after registration.
  float fitness_score = 2;
  // Iterations used.
  uint32 iterations = 3;
  // Optional transform-norm in m / rad between consecutive estimates.
  float translation_diff = 4;
  float rotation_diff = 5;
  bool converged = 6;
}
