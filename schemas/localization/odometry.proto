syntax = "proto3";

package vmsgs.proto.localization;

import "common/header.proto";
import "geometry/pose.proto";
import "geometry/twist.proto";

// Pose+twist with covariance, expressed in `header.frame_id` (parent) for pose
// and in `child_frame_id` for twist. Mirrors nav_msgs/Odometry.
message Odometry {
  vmsgs.proto.common.Header header = 1;
  string child_frame_id = 2;
  vmsgs.proto.geometry.PoseWithCovariance pose = 3;
  vmsgs.proto.geometry.TwistWithCovariance twist = 4;
}
