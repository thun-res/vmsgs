syntax = "proto3";

package vmsgs.proto.system;

import "common/header.proto";

// Mirrors autoware_internal_msgs/ResourceUsageReport + tier4_debug_msgs/SystemUsage.

message CpuUsage {
  uint32 cpu_id = 1;
  float user_percent = 2;
  float system_percent = 3;
  float idle_percent = 4;
  float total_percent = 5;
}

message MemoryUsage {
  uint64 total_bytes = 1;
  uint64 used_bytes = 2;
  uint64 free_bytes = 3;
  uint64 cached_bytes = 4;
  uint64 swap_total_bytes = 5;
  uint64 swap_used_bytes = 6;
}

message GpuUsage {
  uint32 gpu_id = 1;
  string name = 2;
  float utilization_percent = 3;
  uint64 memory_used_bytes = 4;
  uint64 memory_total_bytes = 5;
  float temperature_c = 6;
  float power_w = 7;
}

message DiskUsage {
  string mount_point = 1;
  uint64 total_bytes = 2;
  uint64 used_bytes = 3;
  uint64 free_bytes = 4;
  float read_bytes_per_sec = 5;
  float write_bytes_per_sec = 6;
}

message NetworkUsage {
  string interface_name = 1;
  uint64 rx_bytes = 2;
  uint64 tx_bytes = 3;
  float rx_bytes_per_sec = 4;
  float tx_bytes_per_sec = 5;
}

message ResourceUsageReport {
  vmsgs.proto.common.Header header = 1;
  repeated CpuUsage cpu = 2;
  MemoryUsage memory = 3;
  repeated GpuUsage gpu = 4;
  repeated DiskUsage disk = 5;
  repeated NetworkUsage network = 6;
}

message SystemUsage {
  vmsgs.proto.common.Header header = 1;
  string node_name = 2;
  // Per-node CPU% and resident memory.
  float cpu_percent = 3;
  uint64 memory_rss_bytes = 4;
  uint32 thread_count = 5;
  // File descriptors opened.
  uint32 fd_count = 6;
}

message SystemUsageArray {
  vmsgs.proto.common.Header header = 1;
  repeated SystemUsage processes = 2;
}
