syntax = "proto3";

package vmsgs.proto.system;

import "common/header.proto";

message ProcessInfo {
  string host = 1;
  uint32 pid = 2;
  string name = 3;
  string ip = 4;
  string args = 5;
}

message ProcessInfoArray {
  vmsgs.proto.common.Header header = 1;
  repeated ProcessInfo processes = 2;
}
