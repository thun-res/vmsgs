syntax = "proto3";

package vmsgs.proto.sensor;

import "common/header.proto";
import "geometry/quaternion.proto";
import "geometry/vector3.proto";

// 9-DoF IMU output (orientation + angular velocity + linear acceleration).
// Set the first element of a covariance to -1 if that quantity is unknown.
message Imu {
  vmsgs.proto.common.Header header = 1;

  vmsgs.proto.geometry.Quaternion orientation = 2;
  // Length 9; row-major.
  repeated double orientation_covariance = 3 [packed = true];

  vmsgs.proto.geometry.Vector3 angular_velocity = 4;
  repeated double angular_velocity_covariance = 5 [packed = true];

  vmsgs.proto.geometry.Vector3 linear_acceleration = 6;
  repeated double linear_acceleration_covariance = 7 [packed = true];
}
