syntax = "proto3";

package vmsgs.proto.embodied;

import "common/header.proto";
import "common/time.proto";

// Single time-parameterized waypoint for a multi-DoF joint group.
message JointTrajectoryPoint {
  vmsgs.proto.common.Duration time_from_start = 1;
  // All vectors are aligned to JointTrajectory.joint_names.
  repeated double positions = 2 [packed = true];      // rad or m
  repeated double velocities = 3 [packed = true];     // rad/s or m/s
  repeated double accelerations = 4 [packed = true];  // rad/s^2 or m/s^2
  repeated double effort = 5 [packed = true];         // Nm or N
}

// Trajectory streamed to a joint controller.
message JointTrajectory {
  vmsgs.proto.common.Header header = 1;
  repeated string joint_names = 2;
  repeated JointTrajectoryPoint points = 3;
}

// Per-joint position/velocity/effort target for a single tick.
message JointCommand {
  vmsgs.proto.common.Header header = 1;
  repeated string joint_names = 2;
  repeated double positions = 3 [packed = true];
  repeated double velocities = 4 [packed = true];
  repeated double effort = 5 [packed = true];
  enum Mode {
    MODE_UNKNOWN = 0;
    MODE_POSITION = 1;
    MODE_VELOCITY = 2;
    MODE_EFFORT = 3;
    MODE_HYBRID = 4;
  }
  Mode mode = 6;
}
