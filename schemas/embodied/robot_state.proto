syntax = "proto3";

package vmsgs.proto.embodied;

import "common/header.proto";
import "geometry/pose.proto";
import "geometry/twist.proto";
import "sensor/joint_state.proto";
import "embodied/manipulator_state.proto";
import "embodied/gripper.proto";

// Aggregated whole-body state of an embodied robot (mobile base + manipulators).
message RobotState {
  vmsgs.proto.common.Header header = 1;
  string robot_id = 2;
  // Base pose in world / map frame.
  vmsgs.proto.geometry.Pose base_pose = 3;
  vmsgs.proto.geometry.Twist base_twist = 4;
  // Articulated-body joints.
  vmsgs.proto.sensor.JointState joints = 5;
  // Per-arm states (e.g. dual-arm humanoid).
  repeated ManipulatorState arms = 6;
  repeated GripperState grippers = 7;
  // Battery / health summary.
  float battery_percentage = 8;
  string operating_mode = 9;     // "idle", "teleop", "autonomous", ...
  bool is_estopped = 10;
}
