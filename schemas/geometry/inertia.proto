syntax = "proto3";

package vmsgs.proto.geometry;

import "geometry/vector3.proto";
import "common/header.proto";

// Mass distribution: mass, center of mass, and (xx,xy,xz,yy,yz,zz) of the inertia tensor.
message Inertia {
  double m = 1;
  Vector3 com = 2;
  double ixx = 3;
  double ixy = 4;
  double ixz = 5;
  double iyy = 6;
  double iyz = 7;
  double izz = 8;
}

message InertiaStamped {
  vmsgs.proto.common.Header header = 1;
  Inertia inertia = 2;
}
